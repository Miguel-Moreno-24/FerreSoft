<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FerreSoft</title>
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="skip-login-btn">← Volver a la Tienda</a>
        <div class="login-box">
            <h1>FerreSoft</h1>
            <h2 id="form-title">Iniciar Sesión</h2>
            
            <form id="auth-form">
                <div id="nombre-group" style="display: none;">
                    <input type="text" id="nombre" placeholder="Nombre completo">
                </div>
                
                <div>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                
                <div>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="Contraseña" required>
                    </div>
                </div>
                
                <button type="submit" id="submit-btn">Iniciar Sesión</button>
            </form>
            
            <p class="toggle-form">
                <span id="toggle-text">¿No tienes cuenta?</span>
                <a href="#" id="toggle-link">Regístrate</a>
            </p>
            
            <div id="message"></div>
        </div>
    </div>
    
    <script src="../public/js/script.js"></script>
    <script src="../public/js/login.js"></script>
</body>
</html>
