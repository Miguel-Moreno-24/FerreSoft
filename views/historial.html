<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Compras - FerreSoft</title>
    <link rel="stylesheet" href="../public/css/styles.css">
    <style>
        .pedido-card {
            background: var(--container-bg);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px var(--shadow-color);
            border-left: 5px solid #3498db;
        }
        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .pedido-info h3 {
            margin: 0;
            color: var(--heading-color);
        }
        .pedido-fecha {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .pedido-estado {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .estado-pendiente { background: #f1c40f; color: #000; }
        .estado-enviado { background: #3498db; color: #fff; }
        .estado-entregado { background: #27ae60; color: #fff; }

        .productos-lista {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .producto-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.5rem 0;
        }
        .producto-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
        .producto-info {
            flex: 1;
        }
        .producto-nombre {
            font-weight: bold;
            display: block;
        }
        .producto-detalle {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        .pedido-total {
            text-align: right;
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #27ae60;
        }
        .no-pedidos {
            text-align: center;
            padding: 3rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h1>FerreSoft - Mi Historial</h1>
            <div class="nav-links">
                <a href="index.html">Volver a la Tienda</a>
                <div class="user-menu-wrapper">
                    <button id="user-menu-btn" class="user-menu-btn">
                        <svg class="user-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span id="user-menu-name">Usuario</span>
                    </button>
                    <div id="user-menu" class="user-menu hidden">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <h2>Historial de Compras</h2>
        <p style="color: #7f8c8d; margin-bottom: 2rem;">Consulta los productos que has adquirido anteriormente.</p>

        <div id="historial-container">
            <p class="loading">Cargando historial...</p>
        </div>
    </main>

    <script src="../public/js/script.js"></script>
    <script src="../public/js/historial.js"></script>
</body>
</html>
